server:
  port: 8081

spring:
  application:
    name: jinjiuDRTM-system
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/jinjiu_drtm?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
